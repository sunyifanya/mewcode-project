# MewCode configuration
# protocol: "anthropic" or "openai"
protocol: anthropic
model: deepseek-v4-pro
base_url: https://api.deepseek.com/anthropic
api_key: sk-3d07e4dc5649496b8be6ab96f0d1210d
thinking_budget: 16000
max_session_age_days: 5
extraction_interval: 5
subagent:
  background:
    enabled: true
  max_turns: 25

# Tool execution settings
tool:
  timeout_seconds: 30
  working_directory: .

# Permission settings
permission:
  mode: default

# Worktree isolation settings
worktree:
  enabled: true
  # symlink_dirs: []                    # 从主仓库软链接到 worktree 的目录
  stale_cleanup_interval_seconds: 3600  # 过期清理间隔（秒），默认 1 小时
  stale_cutoff_hours: 24                # worktree 过期阈值（小时），超过即清理

# MCP external tool servers
mcp:
  servers:
    context7:
      command: npx
      args: ["-y", "@upstash/context7-mcp"]
    time:
      command: python
      args: ["-m", "mcp_server_time"]
    web-search:
      command: npx
      args: ["-y", "duckduckgo-websearch"]