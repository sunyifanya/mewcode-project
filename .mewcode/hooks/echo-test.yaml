hooks:
  - id: echo-test
    event: post_tool_use
    action:
      type: command
      command: "mkdir -p .mewcode/tmp && echo \"[Hook fired] tool=${tool} event=${event}\" >> .mewcode/tmp/mewcode-hook-test.log"
      timeout: 5
      background: false

  - id: block-json-write
    event: pre_tool_use
    if:
      mode: all
      conditions:
        - variable: tool
          operator: "=="
          value: write_file
        - variable: args.file_path
          operator: "=~"
          value: ".*\\.json$"
    reject: true
    action:
      type: command
      command: |
        mkdir -p .mewcode/tmp
        msg="[Hook] JSON file write blocked. Use dedicated JSON tool instead."
        echo "$msg" >> .mewcode/tmp/mewcode-hook-test.log
        echo "$msg"
      timeout: 5
      background: false